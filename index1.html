<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            width: 100vw;
            height: 500px;
            gap: 1rem;
            padding: 1rem;
        }
        @media (max-width:600px) {
            .grid {
                  grid-template-columns: 1fr 1fr;
            }
        }
        .box {
            background-color: red;
        }
    </style>
</head>
<body>
    <div class="grid">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>
</html>
